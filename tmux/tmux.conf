set -g history-limit 10000

set-option -g focus-events on

# vi bindings
set -g status-keys vi
set-window-option -g mode-keys vi

set -s escape-time 0

# rebind prefix
# unbind C-b
set-option -g prefix C-b
bind-key C-b send-prefix

bind c new-window -c "#{pane_current_path}"
bind-key -n M-t new-window -c "#{pane_current_path}"

bind r source-file ~/.config/tmux/tmux.conf \; display-message "reloaded..."

bind-key b set-option status

set-option -g status-style "bg=#dddddd,fg=#141618"
set -g window-status-current-style "bg=#dddddd,fg=#000000,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format "[#I:#W]"
set -g status-left-length 100
set -g status-position top
set -g base-index 1
setw -g pane-base-index 1

set -g mouse on

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

# decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n M-h if-shell "$is_vim" "send-keys M-h" "if-shell -F '#{pane_at_left}' 'previous-window' 'select-pane -L'"
bind-key -n M-j if-shell "$is_vim" "send-keys M-j" "if-shell -F '#{pane_at_bottom}' 'next-window' 'select-pane -D'"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k" "if-shell -F '#{pane_at_top}' 'previous-window' 'select-pane -U'"
bind-key -n M-l if-shell "$is_vim" "send-keys M-l" "if-shell -F '#{pane_at_right}' 'next-window' 'select-pane -R'"

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'M-\\' if-shell \"$is_vim\" 'send-keys M-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'M-\\' if-shell \"$is_vim\" 'send-keys M-\\\\'  'select-pane -l'"

unbind-key -T copy-mode-vi C-h
unbind-key -T copy-mode-vi C-j
unbind-key -T copy-mode-vi C-k
unbind-key -T copy-mode-vi C-l

bind-key -T copy-mode-vi 'M-h' if-shell -F '#{pane_at_left}' 'previous-window' 'select-pane -L'
bind-key -T copy-mode-vi 'M-j' if-shell -F '#{pane_at_bottom}' 'next-window' 'select-pane -D'
bind-key -T copy-mode-vi 'M-k' if-shell -F '#{pane_at_top}' 'previous-window' 'select-pane -U'
bind-key -T copy-mode-vi 'M-l' if-shell -F '#{pane_at_right}' 'next-window' 'select-pane -R'
bind-key -T copy-mode-vi 'M-\' select-pane -l

bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9

# undercurl support in konsole
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%dm'
